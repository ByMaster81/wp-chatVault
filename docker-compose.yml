version: '3.8'

services:
  whatsapp-viewer:
    build: .
    container_name: whatsapp-viewer
    # Tailscale gibi özel ağlarda sadece o IP'den erişim için BIND_IP kullanılabilir.
    # Varsayılan olarak 0.0.0.0 (tüm ağlar) üzerinden açılır.
    ports:
      - "${BIND_IP:-0.0.0.0}:3000:3000"
    # Dışarıdan atacağımız sohbetlerin Docker'a anında yansıması için klasörleri bağlıyoruz
    volumes:
      - ./public/backups:/app/public/backups
    restart: unless-stopped
